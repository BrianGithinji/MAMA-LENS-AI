services:
  - type: web
    name: mamalens-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: mamalens
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["https://your-site.netlify.app"]'
