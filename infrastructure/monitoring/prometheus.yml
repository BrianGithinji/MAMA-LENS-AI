global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mamalens-monitor'
    environment: 'production'

scrape_configs:
  - job_name: 'mamalens-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'mamalens-telemedicine'
    static_configs:
      - targets: ['telemedicine:3001']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
