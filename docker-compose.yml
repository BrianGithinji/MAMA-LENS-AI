version: "3.9"

services:
  # ─── Core API (FastAPI) ───────────────────────────────────────
  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: mamalens-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://mamalens:mamalens_pass@postgres:5432/mamalens_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/api:/app
      - media_files:/app/media
    networks:
      - mamalens-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Telemedicine Service (Node.js) ──────────────────────────
  telemedicine:
    build:
      context: ./backend/telemedicine
      dockerfile: Dockerfile
    container_name: mamalens-telemedicine
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - api
      - redis
    networks:
      - mamalens-network

  # ─── WhatsApp Bot Service ─────────────────────────────────────
  whatsapp-bot:
    build:
      context: ./apps/whatsapp-bot
      dockerfile: Dockerfile
    container_name: mamalens-whatsapp
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    depends_on:
      - api
      - redis
    networks:
      - mamalens-network

  # ─── SMS/USSD Gateway ─────────────────────────────────────────
  sms-ussd:
    build:
      context: ./backend/sms-ussd
      dockerfile: Dockerfile
    container_name: mamalens-sms-ussd
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - mamalens-network

  # ─── Web Frontend ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: mamalens-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - mamalens-network

  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mamalens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mamalens_db
      POSTGRES_USER: mamalens
      POSTGRES_PASSWORD: mamalens_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - mamalens-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mamalens -d mamalens_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mamalens-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-mamalens_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mamalens-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mamalens-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - web
      - telemedicine
    networks:
      - mamalens-network

  # ─── Celery Worker (Background Tasks) ────────────────────────
  celery-worker:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: mamalens-celery
    restart: unless-stopped
    command: celery -A app.celery worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://mamalens:mamalens_pass@postgres:5432/mamalens_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - mamalens-network

  # ─── Celery Beat (Scheduled Tasks) ───────────────────────────
  celery-beat:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: mamalens-celery-beat
    restart: unless-stopped
    command: celery -A app.celery beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://mamalens:mamalens_pass@postgres:5432/mamalens_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - mamalens-network

  # ─── Prometheus (Monitoring) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: mamalens-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - mamalens-network

  # ─── Grafana (Dashboards) ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: mamalens-grafana
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=mamalens_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mamalens-network

volumes:
  postgres_data:
  redis_data:
  media_files:
  prometheus_data:
  grafana_data:

networks:
  mamalens-network:
    driver: bridge
